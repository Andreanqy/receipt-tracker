services:
  web:
    build: .
    container_name: receipt_tracker_web
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    env_file:
      - .env
    environment:
      - WATHCFILES_FORCE_POLLING=true
    #command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - db
      - redis
    networks:
      - app_network

  db:
    image: postgres:16-alpine
    container_name: receipt_tracker_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
  
  redis:
    image: redis:7-alpine
    container_name: receipt_tracker_redis
    ports:
      - "6379:6379"
    networks:
      - app_network

  storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: receipt_tracker_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: